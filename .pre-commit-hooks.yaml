- id: update-readme
  name: Update README (addons table)
  entry: oops-update-readme
  language: python
  pass_filenames: false

- id: exclude-addons
  name: Exclude addons from pre-commit checks
  entry: oops-exclude-addons
  language: python
  pass_filenames: false

- id: check-project
  name: Check project configuration
  entry: oops-check-project
  language: python
  pass_filenames: false

- id: check-manifest
  name: Check manifest files
  entry: oops-check-manifest
  language: python
  types: [python]
  pass_filenames: true
  files: (__manifest__\.py|__openerp__\.py|__terp__\.py)$

- id: check-requirements
  name: Check Python requirements
  entry: oops-check-requirements
  language: python
  pass_filenames: false

- id: check-submodules
  name: Check submodules
  entry: oops-check-submodules
  language: python
  pass_filenames: false
