<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Addons List Report</title>

        <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>

        <style>
            :root {
                --bg: #fafafa;
                --bg-card: #ffffff;
                --bg-soft: #f4f4f5;
                --border: #e4e4e7;
                --text: #18181b;
                --text-muted: #71717a;
                --accent: #2563eb;
                --warning: #d97706;
                --warning-bg: #fef3c7;

                /* Classification colors */
                --oca: #7c3aed;
                --oca-bg: #ede9fe;
                --custom: #059669;
                --custom-bg: #d1fae5;
                --third-party: #ea580c;
                --third-party-bg: #ffedd5;

                /* LoC type colors */
                --loc-python: #3b82f6;
                --loc-xml: #f59e0b;
                --loc-js: #eab308;
                --loc-docs: #94a3b8;

                --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            }

            * {
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: var(--bg);
                color: var(--text);
                margin: 0;
                padding: 2rem;
                line-height: 1.5;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            header {
                border-bottom: 2px solid var(--border);
                padding-bottom: 1.5rem;
                margin-bottom: 2rem;
            }
            header h1 {
                margin: 0 0 0.25rem;
                font-size: 1.75rem;
            }
            header .subtitle {
                color: var(--text-muted);
                font-size: 0.9rem;
            }

            h2 {
                font-size: 1.2rem;
                margin: 2.5rem 0 1rem;
                padding-bottom: 0.5rem;
                border-bottom: 1px solid var(--border);
            }

            .warnings {
                background: var(--warning-bg);
                border-left: 3px solid var(--warning);
                padding: 0.75rem 1rem;
                margin: 1rem 0;
                border-radius: 0 4px 4px 0;
            }
            .warnings ul {
                margin: 0;
                padding-left: 1.2rem;
            }
            .warnings li {
                color: #78350f;
                font-size: 0.9rem;
                margin: 0.25rem 0;
            }

            /* Summary cards */
            .summary-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 0.75rem;
                margin: 1rem 0 2rem;
            }
            .summary-card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 1rem;
            }
            .summary-card .value {
                font-size: 1.75rem;
                font-weight: 600;
                font-family: var(--mono);
            }
            .summary-card .label {
                font-size: 0.75rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                margin-top: 0.25rem;
            }

            /* Charts row */
            .charts-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1.5rem;
                margin-bottom: 2rem;
            }
            .chart-card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.5rem;
            }
            .chart-card h3 {
                margin: 0 0 1rem;
                font-size: 0.9rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .chart-container {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 240px;
            }

            /* Legend */
            .legend {
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                justify-content: center;
                margin-top: 1rem;
                font-size: 0.8rem;
            }
            .legend-item {
                display: flex;
                align-items: center;
                gap: 0.35rem;
            }
            .legend-swatch {
                display: inline-block;
                width: 12px;
                height: 12px;
                border-radius: 2px;
            }

            /* Filters bar */
            .filters {
                display: flex;
                gap: 0.5rem;
                margin-bottom: 1rem;
                flex-wrap: wrap;
                align-items: center;
            }
            .filters input[type="search"] {
                flex: 1;
                min-width: 240px;
                padding: 0.5rem 0.75rem;
                border: 1px solid var(--border);
                border-radius: 4px;
                font-size: 0.85rem;
                font-family: inherit;
            }
            .filters input[type="search"]:focus {
                outline: 2px solid var(--accent);
                outline-offset: -1px;
            }
            .filter-btn {
                padding: 0.4rem 0.75rem;
                border: 1px solid var(--border);
                background: var(--bg-card);
                border-radius: 4px;
                cursor: pointer;
                font-size: 0.8rem;
                font-family: inherit;
                color: var(--text-muted);
                transition: all 0.15s;
            }
            .filter-btn:hover {
                color: var(--text);
            }
            .filter-btn.active {
                background: var(--text);
                color: white;
                border-color: var(--text);
            }
            .filter-count {
                font-family: var(--mono);
                font-size: 0.75rem;
                opacity: 0.7;
                margin-left: 0.25rem;
            }

            /* Table */
            .table-wrapper {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 8px;
                overflow: hidden;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.85rem;
            }
            th,
            td {
                text-align: left;
                padding: 0.5rem 0.75rem;
                border-bottom: 1px solid var(--border);
            }
            th {
                background: var(--bg-soft);
                font-weight: 600;
                color: var(--text-muted);
                text-transform: uppercase;
                font-size: 0.7rem;
                letter-spacing: 0.05em;
                cursor: pointer;
                user-select: none;
                white-space: nowrap;
            }
            th:hover {
                color: var(--text);
            }
            th.sorted-asc::after {
                content: " ▲";
                font-size: 0.65rem;
            }
            th.sorted-desc::after {
                content: " ▼";
                font-size: 0.65rem;
            }
            td.num {
                font-family: var(--mono);
                text-align: right;
            }
            td.muted {
                color: var(--text-muted);
                font-size: 0.8rem;
            }
            tr:last-child td {
                border-bottom: none;
            }
            tbody tr:hover {
                background: var(--bg-soft);
            }

            /* Classification badges */
            .badge {
                display: inline-block;
                padding: 0.1rem 0.5rem;
                border-radius: 3px;
                font-size: 0.7rem;
                font-family: var(--mono);
                text-transform: uppercase;
                letter-spacing: 0.03em;
                font-weight: 500;
            }
            .badge-oca {
                background: var(--oca-bg);
                color: var(--oca);
            }
            .badge-custom {
                background: var(--custom-bg);
                color: var(--custom);
            }
            .badge-third-party {
                background: var(--third-party-bg);
                color: var(--third-party);
            }

            /* Mini stacked bar for LoC breakdown in table */
            .loc-bar {
                display: flex;
                height: 6px;
                width: 100px;
                border-radius: 2px;
                overflow: hidden;
                background: var(--bg-soft);
            }
            .loc-bar-segment {
                height: 100%;
            }

            /* Empty state */
            .empty-state {
                padding: 3rem;
                text-align: center;
                color: var(--text-muted);
                font-size: 0.9rem;
            }

            footer {
                margin-top: 3rem;
                padding-top: 1.5rem;
                border-top: 1px solid var(--border);
                color: var(--text-muted);
                font-size: 0.8rem;
            }

            details {
                margin-top: 2rem;
            }
            details summary {
                cursor: pointer;
                color: var(--accent);
                font-size: 0.85rem;
            }
            .raw-json {
                background: var(--bg-soft);
                padding: 1rem;
                border-radius: 4px;
                font-family: var(--mono);
                font-size: 0.75rem;
                overflow-x: auto;
                max-height: 400px;
                overflow-y: auto;
                margin-top: 0.5rem;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Addons List Report</h1>
                <div class="subtitle" id="meta-subtitle"></div>
            </header>

            <section id="global-warnings"></section>

            <!-- Summary -->
            <div class="summary-grid" id="summary"></div>

            <!-- Charts -->
            <div class="charts-row">
                <div class="chart-card">
                    <h3>Addons by classification</h3>
                    <div class="chart-container" id="chart-classification"></div>
                    <div class="legend" id="legend-classification"></div>
                </div>
                <div class="chart-card">
                    <h3>Lines of code by type</h3>
                    <div class="chart-container" id="chart-loc"></div>
                    <div class="legend" id="legend-loc"></div>
                </div>
            </div>

            <h2>All addons</h2>

            <div class="filters">
                <input type="search" id="search" placeholder="Filter by name, author, submodule…" />
                <button class="filter-btn active" data-classification="all">
                    All <span class="filter-count" id="count-all"></span>
                </button>
                <button class="filter-btn" data-classification="oca">
                    OCA <span class="filter-count" id="count-oca"></span>
                </button>
                <button class="filter-btn" data-classification="custom">
                    Custom <span class="filter-count" id="count-custom"></span>
                </button>
                <button class="filter-btn" data-classification="third-party">
                    Third-party <span class="filter-count" id="count-third-party"></span>
                </button>
            </div>

            <div class="table-wrapper">
                <table id="addons-table">
                    <thead>
                        <tr>
                            <th data-sort="addon">Addon</th>
                            <th data-sort="classification">Type</th>
                            <th data-sort="version">Version</th>
                            <th data-sort="submodule">Source</th>
                            <th data-sort="loc_total" class="num">LoC</th>
                            <th>Breakdown</th>
                            <th data-sort="loc_pct" class="num">%</th>
                        </tr>
                    </thead>
                    <tbody id="addons-tbody"></tbody>
                </table>
                <div class="empty-state" id="empty-state" style="display: none">
                    No addons match the current filters.
                </div>
            </div>

            <details>
                <summary>Raw JSON payload</summary>
                <pre class="raw-json" id="raw-json"></pre>
            </details>

            <footer>
                Generated by <code>oops addons list</code> &middot;
                <span id="meta-timestamp"></span>
            </footer>
        </div>

        <script id="report-data" type="application/json">
            __REPORT_DATA__
        </script>

        <script>
            const DATA = JSON.parse(document.getElementById("report-data").textContent);
            const ADDONS = DATA.data || [];

            const CLASSIFICATION_COLORS = {
                oca: getComputedStyle(document.documentElement).getPropertyValue("--oca").trim(),
                custom: getComputedStyle(document.documentElement).getPropertyValue("--custom").trim(),
                "third-party": getComputedStyle(document.documentElement).getPropertyValue("--third-party").trim(),
            };
            const LOC_COLORS = {
                python: getComputedStyle(document.documentElement).getPropertyValue("--loc-python").trim(),
                xml: getComputedStyle(document.documentElement).getPropertyValue("--loc-xml").trim(),
                js: getComputedStyle(document.documentElement).getPropertyValue("--loc-js").trim(),
                docs: getComputedStyle(document.documentElement).getPropertyValue("--loc-docs").trim(),
            };

            // Helpers
            const el = (tag, attrs = {}, children = []) => {
                const node = document.createElement(tag);
                for (const [k, v] of Object.entries(attrs)) {
                    if (k === "class") node.className = v;
                    else if (k === "html") node.innerHTML = v;
                    else node.setAttribute(k, v);
                }
                for (const child of [].concat(children)) {
                    if (child == null) continue;
                    node.append(child instanceof Node ? child : String(child));
                }
                return node;
            };

            const fmt = (n) => n.toLocaleString();

            // -- Global warnings ----------------------------------------------------
            if (DATA.warnings && DATA.warnings.length) {
                const wb = el("div", { class: "warnings" }, [
                    el(
                        "ul",
                        {},
                        DATA.warnings.map((w) => el("li", {}, w)),
                    ),
                ]);
                document.getElementById("global-warnings").append(wb);
            }

            // -- Summary cards ------------------------------------------------------
            const totalLoc = ADDONS.reduce((s, a) => s + a.loc_total, 0);
            const totalPy = ADDONS.reduce((s, a) => s + a.loc_python, 0);
            const totalXml = ADDONS.reduce((s, a) => s + a.loc_xml, 0);
            const totalJs = ADDONS.reduce((s, a) => s + a.loc_js, 0);
            const totalDocs = ADDONS.reduce((s, a) => s + a.loc_docs, 0);
            const byClass = d3.rollup(
                ADDONS,
                (v) => v.length,
                (a) => a.classification,
            );

            const summaryCards = [
                ["Addons", ADDONS.length],
                ["Total LoC", fmt(totalLoc)],
                ["Python", fmt(totalPy)],
                ["XML", fmt(totalXml)],
                ["JavaScript", fmt(totalJs)],
                ["Docs", fmt(totalDocs)],
            ];
            const summaryContainer = document.getElementById("summary");
            summaryCards.forEach(([label, value]) => {
                summaryContainer.append(
                    el("div", { class: "summary-card" }, [
                        el("div", { class: "value" }, value),
                        el("div", { class: "label" }, label),
                    ]),
                );
            });

            // -- Classification pie chart -------------------------------------------
            function renderClassificationChart() {
                const data = Array.from(byClass, ([key, value]) => ({ key, value })).sort((a, b) => b.value - a.value);

                const width = 240,
                    height = 240,
                    radius = Math.min(width, height) / 2;
                const svg = d3
                    .select("#chart-classification")
                    .append("svg")
                    .attr("viewBox", `${-width / 2} ${-height / 2} ${width} ${height}`)
                    .attr("width", width)
                    .attr("height", height);

                const pie = d3
                    .pie()
                    .value((d) => d.value)
                    .sort(null);
                const arc = d3
                    .arc()
                    .innerRadius(radius * 0.55)
                    .outerRadius(radius - 5);

                svg.selectAll("path")
                    .data(pie(data))
                    .join("path")
                    .attr("d", arc)
                    .attr("fill", (d) => CLASSIFICATION_COLORS[d.data.key] || "#999")
                    .attr("stroke", "white")
                    .attr("stroke-width", 2);

                // Center label
                svg.append("text")
                    .attr("text-anchor", "middle")
                    .attr("dy", "-0.2em")
                    .style("font-size", "1.4rem")
                    .style("font-weight", "600")
                    .style("font-family", "var(--mono)")
                    .text(ADDONS.length);
                svg.append("text")
                    .attr("text-anchor", "middle")
                    .attr("dy", "1.2em")
                    .style("font-size", ".7rem")
                    .style("fill", "var(--text-muted)")
                    .style("text-transform", "uppercase")
                    .style("letter-spacing", ".05em")
                    .text("addons");

                // Legend
                const legend = d3.select("#legend-classification");
                data.forEach((d) => {
                    const item = legend.append("div").attr("class", "legend-item");
                    item.append("span")
                        .attr("class", "legend-swatch")
                        .style("background", CLASSIFICATION_COLORS[d.key] || "#999");
                    item.append("span").text(`${d.key} (${d.value})`);
                });
            }
            renderClassificationChart();

            // -- LoC by type bar chart ----------------------------------------------
            function renderLocChart() {
                const data = [
                    { key: "python", value: totalPy },
                    { key: "xml", value: totalXml },
                    { key: "js", value: totalJs },
                    { key: "docs", value: totalDocs },
                ].filter((d) => d.value > 0);

                const width = 320,
                    height = 240;
                const margin = { top: 10, right: 10, bottom: 28, left: 56 };
                const innerW = width - margin.left - margin.right;
                const innerH = height - margin.top - margin.bottom;

                const svg = d3
                    .select("#chart-loc")
                    .append("svg")
                    .attr("viewBox", `0 0 ${width} ${height}`)
                    .attr("width", width)
                    .attr("height", height);

                const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

                const x = d3
                    .scaleBand()
                    .domain(data.map((d) => d.key))
                    .range([0, innerW])
                    .padding(0.3);

                const y = d3
                    .scaleLinear()
                    .domain([0, d3.max(data, (d) => d.value)])
                    .nice()
                    .range([innerH, 0]);

                g.selectAll("rect")
                    .data(data)
                    .join("rect")
                    .attr("x", (d) => x(d.key))
                    .attr("y", (d) => y(d.value))
                    .attr("width", x.bandwidth())
                    .attr("height", (d) => innerH - y(d.value))
                    .attr("fill", (d) => LOC_COLORS[d.key] || "#999")
                    .attr("rx", 2);

                g.selectAll("text.bar-label")
                    .data(data)
                    .join("text")
                    .attr("class", "bar-label")
                    .attr("x", (d) => x(d.key) + x.bandwidth() / 2)
                    .attr("y", (d) => y(d.value) - 4)
                    .attr("text-anchor", "middle")
                    .style("font-size", ".7rem")
                    .style("font-family", "var(--mono)")
                    .style("fill", "var(--text-muted)")
                    .text((d) => fmt(d.value));

                g.append("g")
                    .attr("transform", `translate(0,${innerH})`)
                    .call(d3.axisBottom(x).tickSize(0).tickPadding(8))
                    .call((g) => g.select(".domain").remove())
                    .selectAll("text")
                    .style("font-size", ".75rem")
                    .style("fill", "var(--text-muted)");

                g.append("g")
                    .call(d3.axisLeft(y).ticks(5).tickFormat(d3.format("~s")))
                    .call((g) => g.select(".domain").remove())
                    .selectAll("text")
                    .style("font-size", ".7rem")
                    .style("fill", "var(--text-muted)");

                // Legend
                const legend = d3.select("#legend-loc");
                data.forEach((d) => {
                    const item = legend.append("div").attr("class", "legend-item");
                    item.append("span").attr("class", "legend-swatch").style("background", LOC_COLORS[d.key]);
                    item.append("span").text(`${d.key} (${fmt(d.value)})`);
                });
            }
            renderLocChart();

            // -- Filter counts ------------------------------------------------------
            document.getElementById("count-all").textContent = ADDONS.length;
            ["oca", "custom", "third-party"].forEach((c) => {
                const n = ADDONS.filter((a) => a.classification === c).length;
                document.getElementById(`count-${c}`).textContent = n;
            });

            // -- Table --------------------------------------------------------------
            const state = {
                sortKey: "loc_total",
                sortDir: "desc",
                classification: "all",
                search: "",
            };

            function renderTable() {
                const tbody = document.getElementById("addons-tbody");
                tbody.innerHTML = "";

                const query = state.search.toLowerCase();
                const filtered = ADDONS.filter((a) => {
                    if (state.classification !== "all" && a.classification !== state.classification) return false;
                    if (!query) return true;
                    return (
                        a.addon.toLowerCase().includes(query) ||
                        (a.author || "").toLowerCase().includes(query) ||
                        (a.submodule || "").toLowerCase().includes(query)
                    );
                });

                const sorted = [...filtered].sort((a, b) => {
                    const av = a[state.sortKey];
                    const bv = b[state.sortKey];
                    if (typeof av === "number" && typeof bv === "number") {
                        return state.sortDir === "asc" ? av - bv : bv - av;
                    }
                    return state.sortDir === "asc"
                        ? String(av).localeCompare(String(bv))
                        : String(bv).localeCompare(String(av));
                });

                document.getElementById("empty-state").style.display = sorted.length === 0 ? "block" : "none";

                sorted.forEach((a) => {
                    const segments = [
                        ["python", a.loc_python],
                        ["xml", a.loc_xml],
                        ["js", a.loc_js],
                        ["docs", a.loc_docs],
                    ];
                    const bar = el("div", { class: "loc-bar" });
                    segments.forEach(([k, v]) => {
                        if (!a.loc_total || !v) return;
                        const seg = el("div", {
                            class: "loc-bar-segment",
                            title: `${k}: ${fmt(v)} (${((v / a.loc_total) * 100).toFixed(1)}%)`,
                        });
                        seg.style.width = `${(v / a.loc_total) * 100}%`;
                        seg.style.background = LOC_COLORS[k];
                        bar.append(seg);
                    });

                    tbody.append(
                        el("tr", {}, [
                            el("td", {}, el("strong", {}, a.addon)),
                            el(
                                "td",
                                {},
                                el(
                                    "span",
                                    {
                                        class: `badge badge-${a.classification}`,
                                    },
                                    a.classification,
                                ),
                            ),
                            el("td", { class: "muted" }, a.version || "—"),
                            el("td", { class: "muted" }, a.submodule || "—"),
                            el("td", { class: "num" }, fmt(a.loc_total)),
                            el("td", {}, bar),
                            el("td", { class: "num muted" }, `${a.loc_pct}%`),
                        ]),
                    );
                });

                // Update sort indicators
                document.querySelectorAll("th[data-sort]").forEach((th) => {
                    th.classList.remove("sorted-asc", "sorted-desc");
                    if (th.dataset.sort === state.sortKey) {
                        th.classList.add(state.sortDir === "asc" ? "sorted-asc" : "sorted-desc");
                    }
                });
            }

            // -- Event handlers -----------------------------------------------------
            document.getElementById("search").addEventListener("input", (e) => {
                state.search = e.target.value;
                renderTable();
            });

            document.querySelectorAll(".filter-btn").forEach((btn) => {
                btn.addEventListener("click", () => {
                    document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    state.classification = btn.dataset.classification;
                    renderTable();
                });
            });

            document.querySelectorAll("th[data-sort]").forEach((th) => {
                th.addEventListener("click", () => {
                    const key = th.dataset.sort;
                    if (state.sortKey === key) {
                        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
                    } else {
                        state.sortKey = key;
                        state.sortDir = "desc";
                    }
                    renderTable();
                });
            });

            renderTable();

            // -- Meta ---------------------------------------------------------------
            document.getElementById("meta-subtitle").textContent =
                `${ADDONS.length} addons · ${fmt(totalLoc)} total LoC`;
            document.getElementById("meta-timestamp").textContent = new Date().toLocaleString();
            document.getElementById("raw-json").textContent = JSON.stringify(DATA, null, 2);
        </script>
    </body>
</html>
