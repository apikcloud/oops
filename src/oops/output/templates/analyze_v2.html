<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Module Analysis Report</title>

        <style>
            :root {
                --bg: #fafafa;
                --bg-card: #ffffff;
                --bg-soft: #f4f4f5;
                --border: #e4e4e7;
                --text: #18181b;
                --text-muted: #71717a;
                --accent: #2563eb;
                --warning: #d97706;
                --warning-bg: #fef3c7;

                --origin-odoo: #0ea5e9;
                --origin-enterprise: #be185d;
                --origin-oca: #7c3aed;
                --origin-local: #059669;
                --origin-custom: #059669;
                --origin-third-party: #ea580c;
                --origin-unknown: #71717a;

                --section-compute: #2563eb;
                --section-select: #0891b2;
                --section-default: #6366f1;
                --section-onchange: #7c3aed;
                --section-constrain: #be185d;
                --section-crud: #ea580c;
                --section-helper: #71717a;
                --section-action: #059669;
                --section-business: #dc2626;

                --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            }

            * {
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: var(--bg);
                color: var(--text);
                margin: 0;
                padding: 2rem;
                line-height: 1.5;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            /* ---------------- Header ---------------- */
            header {
                border-bottom: 2px solid var(--border);
                padding-bottom: 1.5rem;
                margin-bottom: 2rem;
            }
            header h1 {
                margin: 0 0 0.25rem;
                font-size: 1.75rem;
            }
            header .subtitle {
                color: var(--text-muted);
                font-size: 0.9rem;
            }

            h2 {
                font-size: 1.3rem;
                margin: 2.5rem 0 1rem;
                padding-bottom: 0.5rem;
                border-bottom: 1px solid var(--border);
            }
            h3 {
                font-size: 1.05rem;
                margin: 1.5rem 0 0.75rem;
            }
            h4 {
                font-size: 0.75rem;
                margin: 1rem 0 0.5rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                font-weight: 600;
            }

            /* ---------------- Warnings ---------------- */
            .warnings {
                background: var(--warning-bg);
                border-left: 3px solid var(--warning);
                padding: 0.75rem 1rem;
                margin: 1rem 0;
                border-radius: 0 4px 4px 0;
            }
            .warnings ul {
                margin: 0;
                padding-left: 1.2rem;
            }
            .warnings li {
                color: #78350f;
                font-size: 0.9rem;
                margin: 0.25rem 0;
            }

            /* ---------------- Module ---------------- */
            .module {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.5rem;
                margin-bottom: 2rem;
            }

            /* ---------------- Manifest ---------------- */
            .manifest-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 0.75rem;
                margin-bottom: 1rem;
            }
            .manifest-grid .item .label {
                color: var(--text-muted);
                display: block;
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .manifest-grid .item .value {
                font-weight: 500;
                font-size: 0.9rem;
            }

            .chip-list {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
            }
            .chip {
                background: var(--bg-soft);
                padding: 0.15rem 0.55rem;
                border-radius: 3px;
                color: var(--text-muted);
                font-family: var(--mono);
                font-size: 0.75rem;
            }

            /* ---------------- Metrics ---------------- */
            .metrics-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 0.65rem;
                margin: 1rem 0;
            }
            .metric {
                background: var(--bg-soft);
                padding: 0.65rem 0.85rem;
                border-radius: 5px;
            }
            .metric .value {
                font-size: 1.3rem;
                font-weight: 600;
                font-family: var(--mono);
            }
            .metric .label {
                font-size: 0.7rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            /* ---------------- Tables ---------------- */
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.85rem;
                margin: 0.5rem 0;
            }
            th,
            td {
                text-align: left;
                padding: 0.45rem 0.65rem;
                border-bottom: 1px solid var(--border);
            }
            th {
                background: var(--bg-soft);
                font-weight: 600;
                color: var(--text-muted);
                text-transform: uppercase;
                font-size: 0.65rem;
                letter-spacing: 0.05em;
                white-space: nowrap;
            }
            td.num {
                font-family: var(--mono);
                text-align: right;
            }
            td.zero {
                color: var(--text-muted);
                opacity: 0.5;
            }
            td.muted {
                color: var(--text-muted);
            }
            td code,
            td.mono {
                font-family: var(--mono);
                font-size: 0.8rem;
            }
            tr:last-child td {
                border-bottom: none;
            }

            /* ---------------- Models table ---------------- */
            .models-table-wrap {
                overflow-x: auto;
                border: 1px solid var(--border);
                border-radius: 6px;
            }
            .models-table {
                font-size: 0.8rem;
            }
            .models-table th {
                font-size: 0.6rem;
            }
            .models-table tr.clickable {
                cursor: pointer;
                transition: background 0.12s;
            }
            .models-table tr.clickable:hover {
                background: var(--bg-soft);
            }
            .models-table tr.clickable td:first-child {
                font-family: var(--mono);
            }

            .section-cell {
                display: inline-block;
                min-width: 1.5rem;
                text-align: center;
                font-family: var(--mono);
                font-size: 0.75rem;
            }
            .section-cell.has-value {
                padding: 0.05rem 0.35rem;
                border-radius: 3px;
                color: white;
                font-weight: 600;
            }
            .section-cell.compute {
                background: var(--section-compute);
            }
            .section-cell.select {
                background: var(--section-select);
            }
            .section-cell.default {
                background: var(--section-default);
            }
            .section-cell.onchange {
                background: var(--section-onchange);
            }
            .section-cell.constrain {
                background: var(--section-constrain);
            }
            .section-cell.crud {
                background: var(--section-crud);
            }
            .section-cell.helper {
                background: var(--section-helper);
            }
            .section-cell.action {
                background: var(--section-action);
            }
            .section-cell.business {
                background: var(--section-business);
            }

            /* ---------------- Badges ---------------- */
            .badge {
                display: inline-block;
                padding: 0.1rem 0.5rem;
                border-radius: 3px;
                font-size: 0.65rem;
                font-family: var(--mono);
                text-transform: uppercase;
                letter-spacing: 0.03em;
                font-weight: 600;
                color: white;
            }
            .badge.odoo {
                background: var(--origin-odoo);
            }
            .badge.enterprise {
                background: var(--origin-enterprise);
            }
            .badge.oca {
                background: var(--origin-oca);
            }
            .badge.local {
                background: var(--origin-local);
            }
            .badge.custom {
                background: var(--origin-custom);
            }
            .badge.third-party {
                background: var(--origin-third-party);
            }
            .badge.unknown {
                background: var(--origin-unknown);
            }
            .badge.outline {
                background: transparent;
                color: var(--text-muted);
                border: 1px solid var(--border);
            }
            .badge.new {
                background: var(--origin-local);
            }
            .badge.inherit {
                background: var(--accent);
            }

            /* ---------------- Drawer ---------------- */
            .drawer-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.3);
                z-index: 10;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s;
            }
            .drawer-backdrop.open {
                opacity: 1;
                pointer-events: auto;
            }

            .drawer {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: min(620px, 100vw);
                background: var(--bg-card);
                border-left: 1px solid var(--border);
                z-index: 11;
                padding: 1.5rem;
                overflow-y: auto;
                transform: translateX(100%);
                transition: transform 0.2s;
                box-shadow: -8px 0 24px rgba(0, 0, 0, 0.08);
            }
            .drawer.open {
                transform: translateX(0);
            }
            .drawer .drawer-close {
                position: absolute;
                top: 1rem;
                right: 1rem;
                border: none;
                background: transparent;
                cursor: pointer;
                font-size: 1.25rem;
                color: var(--text-muted);
                padding: 0.25rem 0.5rem;
            }
            .drawer .drawer-close:hover {
                color: var(--text);
            }
            .drawer h2 {
                margin: 0 0 0.25rem;
                font-size: 1.1rem;
                font-family: var(--mono);
                border: none;
                padding: 0;
                word-break: break-all;
            }
            .drawer .drawer-sub {
                font-size: 0.8rem;
                color: var(--text-muted);
                margin-bottom: 1rem;
            }
            .drawer h3 {
                font-size: 0.95rem;
                margin: 1.25rem 0 0.5rem;
            }
            .drawer .info-row {
                display: flex;
                justify-content: space-between;
                padding: 0.35rem 0;
                border-bottom: 1px solid var(--border);
                font-size: 0.85rem;
            }
            .drawer .info-row .label {
                color: var(--text-muted);
            }
            .drawer .info-row .value {
                font-family: var(--mono);
                font-weight: 500;
            }
            .drawer .field-breakdown {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
                margin: 0.5rem 0;
            }
            .drawer .fb-card {
                background: var(--bg-soft);
                padding: 0.5rem;
                border-radius: 4px;
                text-align: center;
            }
            .drawer .fb-card.base {
                border-left: 3px solid var(--text-muted);
            }
            .drawer .fb-card.new {
                border-left: 3px solid var(--origin-local);
            }
            .drawer .fb-card.inherited {
                border-left: 3px solid var(--accent);
            }
            .drawer .fb-card .value {
                font-family: var(--mono);
                font-size: 1.25rem;
                font-weight: 600;
            }
            .drawer .fb-card .label {
                font-size: 0.65rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .field-types,
            .method-sections {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
                margin: 0.5rem 0;
            }
            .ft-chip {
                background: var(--bg-soft);
                padding: 0.15rem 0.55rem;
                border-radius: 3px;
                font-family: var(--mono);
                font-size: 0.75rem;
            }
            .ft-chip .count {
                font-weight: 600;
                margin-left: 0.25rem;
            }

            .empty-section {
                color: var(--text-muted);
                font-size: 0.85rem;
                font-style: italic;
                padding: 0.5rem 0;
            }

            /* ---------------- Filters ---------------- */
            .filters {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
                margin: 0.75rem 0 1rem;
            }
            .filters input[type="search"] {
                flex: 1;
                min-width: 200px;
                padding: 0.4rem 0.6rem;
                border: 1px solid var(--border);
                border-radius: 4px;
                font-size: 0.8rem;
                font-family: inherit;
            }
            .filters input[type="search"]:focus {
                outline: 2px solid var(--accent);
                outline-offset: -1px;
            }

            /* ---------------- Footer ---------------- */
            footer {
                margin-top: 3rem;
                padding-top: 1.5rem;
                border-top: 1px solid var(--border);
                color: var(--text-muted);
                font-size: 0.8rem;
            }
            details.raw {
                margin-top: 2rem;
            }
            details.raw summary {
                cursor: pointer;
                color: var(--accent);
                font-size: 0.85rem;
            }
            .raw-json {
                background: var(--bg-soft);
                padding: 1rem;
                border-radius: 4px;
                font-family: var(--mono);
                font-size: 0.75rem;
                overflow-x: auto;
                max-height: 400px;
                overflow-y: auto;
                margin-top: 0.5rem;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Module Analysis Report</h1>
                <div class="subtitle" id="meta-subtitle"></div>
            </header>

            <section id="global-warnings"></section>
            <section id="modules"></section>

            <details class="raw">
                <summary>Raw JSON payload</summary>
                <pre class="raw-json" id="raw-json"></pre>
            </details>

            <footer>
                Generated by <code>oops analyze</code> &middot;
                <span id="meta-timestamp"></span>
            </footer>
        </div>

        <!-- Drawer -->
        <div class="drawer-backdrop" id="drawer-backdrop"></div>
        <aside class="drawer" id="drawer">
            <button class="drawer-close" id="drawer-close" aria-label="Close">✕</button>
            <div id="drawer-content"></div>
        </aside>

        <script id="report-data" type="application/json">
            __REPORT_DATA__
        </script>

        <script>
            const DATA = JSON.parse(document.getElementById("report-data").textContent);

            // Section abbreviations used in CLI: Compute Select Default Onchange Constrain CRUD Helper Action Business
            const METHOD_SECTIONS = [
                { key: "COMPUTE METHODS", short: "Comp", cls: "compute" },
                { key: "SELECT METHODS", short: "Sel", cls: "select" },
                { key: "DEFAULT METHODS", short: "Def", cls: "default" },
                { key: "ONCHANGE METHODS", short: "On", cls: "onchange" },
                { key: "CONSTRAINT METHODS", short: "Con", cls: "constrain" },
                { key: "CRUD METHODS", short: "CRUD", cls: "crud" },
                { key: "HELPER METHODS", short: "Help", cls: "helper" },
                { key: "ACTION METHODS", short: "Act", cls: "action" },
                { key: "BUSINESS METHODS", short: "Biz", cls: "business" },
            ];

            // ----- DOM helpers -----
            const el = (tag, attrs = {}, children = []) => {
                const node = document.createElement(tag);
                for (const [k, v] of Object.entries(attrs)) {
                    if (k === "class") node.className = v;
                    else if (k === "html") node.innerHTML = v;
                    else if (v != null) node.setAttribute(k, v);
                }
                for (const child of [].concat(children)) {
                    if (child == null) continue;
                    node.append(child instanceof Node ? child : String(child));
                }
                return node;
            };

            const originBadge = (origin) => el("span", { class: `badge ${origin || "unknown"}` }, origin || "—");

            const numCell = (n, extraClass = "") => {
                const cls = ("num " + extraClass + (n ? "" : " zero")).trim();
                return el("td", { class: cls }, n != null ? n : 0);
            };

            // ===================================================================
            // Global warnings
            // ===================================================================
            if (DATA.warnings && DATA.warnings.length) {
                const wb = el("div", { class: "warnings" }, [
                    el(
                        "ul",
                        {},
                        DATA.warnings.map((w) => el("li", {}, w)),
                    ),
                ]);
                document.getElementById("global-warnings").append(wb);
            }

            // ===================================================================
            // Render each module
            // ===================================================================
            const modulesContainer = document.getElementById("modules");
            DATA.modules.forEach((mod) => modulesContainer.append(renderModule(mod)));

            function renderModule(mod) {
                const root = el("section", { class: "module" });

                // ----- Title + version -----
                root.append(
                    el("h2", {}, [
                        mod.module,
                        " ",
                        el("span", { class: "badge outline" }, mod.manifest.version || "—"),
                    ]),
                );

                // ----- Manifest grid -----
                const manifestGrid = el("div", { class: "manifest-grid" });
                ["name", "author", "license", "category", "installable", "summary"].forEach((f) => {
                    const v = mod.manifest[f];
                    if (v == null || v === "") return;
                    manifestGrid.append(
                        el("div", { class: "item" }, [
                            el("span", { class: "label" }, f),
                            el("span", { class: "value" }, String(v)),
                        ]),
                    );
                });
                root.append(manifestGrid);

                // ----- Depends -----
                if (mod.manifest.depends && mod.manifest.depends.length) {
                    root.append(el("h4", {}, `Depends (${mod.manifest.depends.length})`));
                    root.append(
                        el(
                            "div",
                            { class: "chip-list" },
                            mod.manifest.depends.map((d) => el("span", { class: "chip" }, d)),
                        ),
                    );
                }

                // ----- Module warnings -----
                if (mod.warnings && mod.warnings.length) {
                    root.append(
                        el("div", { class: "warnings" }, [
                            el(
                                "ul",
                                {},
                                mod.warnings.map((w) => el("li", {}, w)),
                            ),
                        ]),
                    );
                }

                // ----- LoC + Views metrics -----
                root.append(el("h4", {}, "Metrics"));
                const totalPrimary = mod.views.primary
                    ? Object.values(mod.views.primary).reduce((a, b) => a + b, 0)
                    : 0;
                root.append(
                    el("div", { class: "metrics-grid" }, [
                        metric("Total LoC", (mod.loc.total || 0).toLocaleString()),
                        metric("Python", (mod.loc.python || 0).toLocaleString()),
                        metric("XML", (mod.loc.xml || 0).toLocaleString()),
                        metric("JS", (mod.loc.javascript || 0).toLocaleString()),
                        metric("Share", `${mod.loc.pct || 0}%`),
                        metric("Primary views", totalPrimary),
                        metric("Extensions", mod.views.extensions || 0),
                        metric("Actions", mod.views.actions || 0),
                        metric("Menus", mod.views.menus || 0),
                    ]),
                );

                // ----- Models -----
                if (mod.models && mod.models.length) {
                    root.append(renderModelsSection(mod));
                }

                // ----- Overrides -----
                root.append(renderOverridesSection(mod));

                // ----- Inherited methods -----
                root.append(renderInheritedSection(mod));

                // ----- Views -----
                if (mod.views && mod.views.list) {
                    root.append(renderViewsSection(mod));
                }

                // ----- Structure / not analysed -----
                if (mod.not_analysed && mod.not_analysed.length) {
                    root.append(el("h4", {}, "Not analysed"));
                    root.append(
                        el(
                            "div",
                            { class: "chip-list" },
                            mod.not_analysed.map((p) => el("span", { class: "chip" }, p)),
                        ),
                    );
                }

                return root;
            }

            function metric(label, value) {
                return el("div", { class: "metric" }, [
                    el("div", { class: "value" }, value),
                    el("div", { class: "label" }, label),
                ]);
            }

            // ===================================================================
            // Models table
            // ===================================================================
            function renderModelsSection(mod) {
                const section = el("section");
                section.append(el("h3", {}, `Models (${mod.models.length})`));

                const tableWrap = el("div", { class: "models-table-wrap" });
                const table = el("table", { class: "models-table" });

                const thead = el("thead");
                const headerCells = [
                    el("th", {}, "Model"),
                    el("th", {}, "Type"),
                    el("th", {}, "Origin"),
                    el("th", { class: "num" }, "Own"),
                    el("th", { class: "num" }, "Inh"),
                    ...METHOD_SECTIONS.map((s) => el("th", { class: "num", title: s.key }, s.short)),
                ];
                thead.append(el("tr", {}, headerCells));
                table.append(thead);

                const tbody = el("tbody");
                mod.models.forEach((m, idx) => {
                    const type = m.is_new_model ? "new" : "inherit";
                    const origin = m.ancestor_origin || "—";

                    const tr = el("tr", { class: "clickable" });
                    tr.append(el("td", {}, m.class_name));
                    tr.append(el("td", {}, el("span", { class: `badge ${type}` }, type)));
                    tr.append(
                        el(
                            "td",
                            {},
                            m.is_new_model ? el("span", { class: "badge outline" }, "—") : originBadge(origin),
                        ),
                    );
                    tr.append(numCell(m.fields.new + m.fields.base));
                    tr.append(numCell(m.fields.inherited));

                    // Method sections
                    const bySection = m.methods.by_section || {};
                    METHOD_SECTIONS.forEach((s) => {
                        const count = bySection[s.key] || 0;
                        const td = el("td", { class: "num" });
                        if (count > 0) {
                            td.append(el("span", { class: `section-cell has-value ${s.cls}` }, count));
                        } else {
                            td.append(el("span", { class: "section-cell" }, "·"));
                        }
                        tr.append(td);
                    });

                    tr.addEventListener("click", () => openModelDrawer(mod, idx));
                    tbody.append(tr);
                });
                table.append(tbody);
                tableWrap.append(table);
                section.append(tableWrap);

                return section;
            }

            // ===================================================================
            // Drawer with model details
            // ===================================================================
            const drawer = document.getElementById("drawer");
            const drawerBackdrop = document.getElementById("drawer-backdrop");
            const drawerContent = document.getElementById("drawer-content");

            function closeDrawer() {
                drawer.classList.remove("open");
                drawerBackdrop.classList.remove("open");
            }
            document.getElementById("drawer-close").addEventListener("click", closeDrawer);
            drawerBackdrop.addEventListener("click", closeDrawer);
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeDrawer();
            });

            function openModelDrawer(mod, modelIdx) {
                const m = mod.models[modelIdx];
                drawerContent.innerHTML = "";

                drawerContent.append(el("h2", {}, m.class_name));
                const sub = [];
                if (m.model_name) sub.push(m.model_name);
                if (m.inherit && m.inherit.length) {
                    sub.push(`inherits ${m.inherit.join(", ")}`);
                }
                drawerContent.append(el("div", { class: "drawer-sub" }, sub.join(" · ") || "—"));

                // Info rows
                const rows = [
                    ["Type", m.is_new_model ? "New model" : "Extension"],
                    ["Ancestor module", m.ancestor_module || "—"],
                    ["Ancestor origin", m.ancestor_origin || "—"],
                ];
                rows.forEach(([label, value]) => {
                    drawerContent.append(
                        el("div", { class: "info-row" }, [
                            el("span", { class: "label" }, label),
                            el("span", { class: "value" }, value),
                        ]),
                    );
                });

                // ---- Fields breakdown ----
                drawerContent.append(el("h3", {}, `Fields (${m.fields.total})`));
                const fb = el("div", { class: "field-breakdown" });
                fb.append(
                    el("div", { class: "fb-card base" }, [
                        el("div", { class: "value" }, m.fields.base),
                        el("div", { class: "label" }, "Base"),
                    ]),
                );
                fb.append(
                    el("div", { class: "fb-card new" }, [
                        el("div", { class: "value" }, m.fields.new),
                        el("div", { class: "label" }, "New"),
                    ]),
                );
                fb.append(
                    el("div", { class: "fb-card inherited" }, [
                        el("div", { class: "value" }, m.fields.inherited),
                        el("div", { class: "label" }, "Inherited"),
                    ]),
                );
                drawerContent.append(fb);

                const byType = m.fields.by_type || {};
                if (Object.keys(byType).length) {
                    drawerContent.append(el("h4", {}, "By type"));
                    const types = el("div", { class: "field-types" });
                    Object.entries(byType)
                        .sort((a, b) => b[1] - a[1])
                        .forEach(([t, n]) => {
                            types.append(el("span", { class: "ft-chip" }, [t, el("span", { class: "count" }, n)]));
                        });
                    drawerContent.append(types);
                }

                // ---- Methods breakdown ----
                drawerContent.append(el("h3", {}, `Methods (${m.methods.total})`));
                const bySection = m.methods.by_section || {};
                if (Object.keys(bySection).length) {
                    const sections = el("div", { class: "method-sections" });
                    METHOD_SECTIONS.forEach((s) => {
                        const n = bySection[s.key] || 0;
                        if (!n) return;
                        sections.append(el("span", { class: `ft-chip` }, [s.short, el("span", { class: "count" }, n)]));
                    });
                    drawerContent.append(sections);
                } else {
                    drawerContent.append(el("div", { class: "empty-section" }, "No methods"));
                }

                // Overrides
                drawerContent.append(el("h4", {}, `Overrides (${m.methods.overrides})`));
                if (m.methods.override_details && m.methods.override_details.length) {
                    drawerContent.append(renderMethodList(m.methods.override_details));
                } else {
                    drawerContent.append(el("div", { class: "empty-section" }, "None"));
                }

                // Inherited
                drawerContent.append(el("h4", {}, `Inherited (${m.methods.inherited})`));
                if (m.methods.inherited_details && m.methods.inherited_details.length) {
                    drawerContent.append(renderMethodList(m.methods.inherited_details));
                } else {
                    drawerContent.append(el("div", { class: "empty-section" }, "None"));
                }

                // Documentation gap
                drawerContent.append(
                    el("div", { class: "info-row", style: "margin-top: 1rem" }, [
                        el("span", { class: "label" }, "Missing docstrings"),
                        el("span", { class: "value" }, m.methods.missing_docstrings),
                    ]),
                );

                drawer.classList.add("open");
                drawerBackdrop.classList.add("open");
            }

            function renderMethodList(items) {
                const table = el("table");
                const thead = el("thead");
                thead.append(el("tr", {}, [el("th", {}, "Method"), el("th", {}, "From")]));
                table.append(thead);
                const tbody = el("tbody");
                items.forEach((item) => {
                    tbody.append(
                        el("tr", {}, [
                            el("td", { class: "mono" }, item.method),
                            el("td", {}, [
                                el("span", { class: `badge ${item.origin || "unknown"}` }, item.origin || "—"),
                                " ",
                                el("span", { class: "muted" }, item.origin_module),
                            ]),
                        ]),
                    );
                });
                table.append(tbody);
                return table;
            }

            // ===================================================================
            // Module-level overrides section
            // ===================================================================
            function renderOverridesSection(mod) {
                const section = el("section");
                const items = mod.models.flatMap((m) =>
                    (m.methods.override_details || []).map((d) => ({ ...d, class_name: m.class_name })),
                );

                section.append(el("h3", {}, `Overrides (${items.length})`));
                if (!items.length) {
                    section.append(el("div", { class: "empty-section" }, "No methods overridden in this module."));
                    return section;
                }

                const table = el("table");
                table.append(
                    el(
                        "thead",
                        {},
                        el("tr", {}, [
                            el("th", {}, "Class"),
                            el("th", {}, "Model"),
                            el("th", {}, "Method"),
                            el("th", {}, "Origin module"),
                            el("th", {}, "Origin"),
                        ]),
                    ),
                );
                const tbody = el("tbody");
                items.forEach((o) => {
                    tbody.append(
                        el("tr", {}, [
                            el("td", { class: "mono" }, o.class_name),
                            el("td", { class: "mono muted" }, o.model),
                            el("td", { class: "mono" }, o.method),
                            el("td", { class: "muted" }, o.origin_module),
                            el("td", {}, originBadge(o.origin)),
                        ]),
                    );
                });
                table.append(tbody);
                section.append(table);

                return section;
            }

            // ===================================================================
            // Module-level inherited section
            // ===================================================================
            function renderInheritedSection(mod) {
                const section = el("section");
                const items = mod.models.flatMap((m) =>
                    (m.methods.inherited_details || []).map((d) => ({ ...d, class_name: m.class_name })),
                );

                section.append(el("h3", {}, `Inherited methods (${items.length})`));
                if (!items.length) {
                    section.append(el("div", { class: "empty-section" }, "No inherited methods exposed."));
                    return section;
                }

                const table = el("table");
                table.append(
                    el(
                        "thead",
                        {},
                        el("tr", {}, [
                            el("th", {}, "Class"),
                            el("th", {}, "Model"),
                            el("th", {}, "Method"),
                            el("th", {}, "Origin module"),
                            el("th", {}, "Origin"),
                        ]),
                    ),
                );
                const tbody = el("tbody");
                items.forEach((o) => {
                    tbody.append(
                        el("tr", {}, [
                            el("td", { class: "mono" }, o.class_name),
                            el("td", { class: "mono muted" }, o.model),
                            el("td", { class: "mono" }, o.method),
                            el("td", { class: "muted" }, o.origin_module),
                            el("td", {}, originBadge(o.origin)),
                        ]),
                    );
                });
                table.append(tbody);
                section.append(table);

                return section;
            }

            // ===================================================================
            // Views table
            // ===================================================================
            function renderViewsSection(mod) {
                const section = el("section");
                const views = mod.views.list || [];
                section.append(el("h3", {}, `Views (${views.length})`));

                // Filters
                const filters = el("div", { class: "filters" });
                const searchInput = el("input", {
                    type: "search",
                    placeholder: "Filter by name, model, xml_id…",
                });
                filters.append(searchInput);
                section.append(filters);

                const table = el("table");
                table.append(
                    el(
                        "thead",
                        {},
                        el("tr", {}, [
                            el("th", {}, "XML ID"),
                            el("th", {}, "Name"),
                            el("th", {}, "Type"),
                            el("th", {}, "Mode"),
                            el("th", {}, "Model"),
                            el("th", {}, "Inherits"),
                            el("th", {}, "Origin"),
                            el("th", { class: "num" }, "Fields"),
                            el("th", { class: "num" }, "Buttons"),
                        ]),
                    ),
                );
                const tbody = el("tbody");

                function renderRows(query = "") {
                    tbody.innerHTML = "";
                    const q = query.toLowerCase();
                    const filtered = q
                        ? views.filter(
                              (v) =>
                                  (v.xml_id || "").toLowerCase().includes(q) ||
                                  (v.name || "").toLowerCase().includes(q) ||
                                  (v.model || "").toLowerCase().includes(q),
                          )
                        : views;

                    filtered.forEach((v) => {
                        tbody.append(
                            el("tr", {}, [
                                el("td", { class: "mono", style: "font-size: .75rem" }, v.xml_id || "—"),
                                el("td", {}, v.name || "—"),
                                el("td", {}, el("span", { class: "badge outline" }, v.view_type || "—")),
                                el("td", { class: "muted" }, v.mode || "—"),
                                el("td", { class: "mono muted" }, v.model || "—"),
                                el("td", { class: "mono muted" }, v.inherit_id || "—"),
                                el("td", {}, originBadge(v.origin)),
                                numCell(v.fields_count),
                                numCell(v.buttons_count),
                            ]),
                        );
                    });
                }
                renderRows();

                searchInput.addEventListener("input", (e) => renderRows(e.target.value));

                table.append(tbody);
                section.append(table);

                return section;
            }

            // ===================================================================
            // Meta
            // ===================================================================
            document.getElementById("meta-subtitle").textContent = `${DATA.modules.length} module(s) analysed`;
            document.getElementById("meta-timestamp").textContent = new Date().toLocaleString();
            document.getElementById("raw-json").textContent = JSON.stringify(DATA, null, 2);
        </script>
    </body>
</html>
