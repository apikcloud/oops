<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dependencies Graph</title>

        <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>

        <style>
            :root {
              --bg: #fafafa;
              --bg-card: #ffffff;
              --bg-soft: #f4f4f5;
              --border: #e4e4e7;
              --text: #18181b;
              --text-muted: #71717a;
              --accent: #2563eb;
              --warning: #d97706;
              --warning-bg: #fef3c7;

              --origin-custom: #059669;
              --origin-oca: #7c3aed;
              --origin-third-party: #ea580c;
              --origin-odoo: #0ea5e9;
              --origin-enterprise: #be185d;
              --origin-unknown: #71717a;

              --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            }

            * { box-sizing: border-box; }

            html, body { margin: 0; padding: 0; height: 100%; }

            body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              background: var(--bg);
              color: var(--text);
              line-height: 1.4;
              overflow: hidden;
            }

            .layout {
              display: grid;
              grid-template-columns: 280px 1fr 320px;
              height: 100vh;
            }

            /* ------------------------------------------------------------------ */
            /* Sidebar (filters)                                                   */
            /* ------------------------------------------------------------------ */
            aside.controls {
              background: var(--bg-card);
              border-right: 1px solid var(--border);
              padding: 1.25rem;
              overflow-y: auto;
            }
            aside.controls h1 {
              margin: 0 0 .25rem; font-size: 1.1rem;
            }
            aside.controls .subtitle {
              color: var(--text-muted); font-size: .8rem; margin-bottom: 1.5rem;
            }

            .section { margin-bottom: 1.5rem; }
            .section-title {
              font-size: .7rem;
              text-transform: uppercase;
              letter-spacing: .05em;
              color: var(--text-muted);
              margin-bottom: .5rem;
              font-weight: 600;
            }

            input[type="search"] {
              width: 100%;
              padding: .5rem .65rem;
              border: 1px solid var(--border);
              border-radius: 4px;
              font-size: .85rem;
              font-family: inherit;
              background: var(--bg);
            }
            input[type="search"]:focus {
              outline: 2px solid var(--accent);
              outline-offset: -1px;
            }

            .checkbox-list label {
              display: flex;
              align-items: center;
              gap: .5rem;
              padding: .3rem 0;
              cursor: pointer;
              font-size: .85rem;
            }
            .checkbox-list .swatch {
              width: 10px; height: 10px;
              border-radius: 2px;
              flex-shrink: 0;
            }
            .checkbox-list .count {
              margin-left: auto;
              font-family: var(--mono);
              font-size: .75rem;
              color: var(--text-muted);
            }

            .slider-wrap {
              display: flex;
              align-items: center;
              gap: .5rem;
            }
            .slider-wrap input[type="range"] {
              flex: 1;
              accent-color: var(--accent);
            }
            .slider-wrap .slider-value {
              font-family: var(--mono);
              font-size: .85rem;
              font-weight: 600;
              min-width: 2.5rem;
              text-align: right;
            }
            .slider-hint {
              font-size: .7rem;
              color: var(--text-muted);
              margin-top: .35rem;
            }
              padding: .4rem .75rem;
              border: 1px solid var(--border);
              background: var(--bg-card);
              border-radius: 4px;
              cursor: pointer;
              font-size: .8rem;
              font-family: inherit;
              color: var(--text);
              width: 100%;
              transition: all .15s;
              margin-top: .25rem;
            }
            .btn:hover { background: var(--bg-soft); }
            .btn-primary {
              background: var(--text);
              color: white;
              border-color: var(--text);
            }
            .btn-primary:hover { opacity: .9; background: var(--text); }

            .stats-grid {
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: .5rem;
            }
            .stat {
              background: var(--bg-soft);
              padding: .5rem .65rem;
              border-radius: 4px;
            }
            .stat .value {
              font-family: var(--mono);
              font-size: 1.1rem;
              font-weight: 600;
            }
            .stat .label {
              font-size: .65rem;
              color: var(--text-muted);
              text-transform: uppercase;
              letter-spacing: .05em;
            }

            .warning-banner {
              background: var(--warning-bg);
              border-left: 3px solid var(--warning);
              padding: .5rem .75rem;
              margin-bottom: 1rem;
              border-radius: 0 4px 4px 0;
              font-size: .8rem;
              color: #78350f;
            }

            /* ------------------------------------------------------------------ */
            /* Graph canvas                                                        */
            /* ------------------------------------------------------------------ */
            main.graph {
              position: relative;
              background: var(--bg);
              overflow: hidden;
            }
            main.graph svg {
              display: block;
              width: 100%;
              height: 100%;
              cursor: grab;
            }
            main.graph svg:active { cursor: grabbing; }

            .floating-controls {
              position: absolute;
              top: 1rem; left: 1rem;
              display: flex; gap: .25rem;
              background: var(--bg-card);
              border: 1px solid var(--border);
              border-radius: 4px;
              padding: .25rem;
              box-shadow: 0 1px 2px rgba(0,0,0,.05);
            }
            .floating-controls button {
              padding: .35rem .5rem;
              border: none;
              background: transparent;
              cursor: pointer;
              font-size: .9rem;
              color: var(--text-muted);
              border-radius: 3px;
              font-family: var(--mono);
              min-width: 28px;
            }
            .floating-controls button:hover {
              background: var(--bg-soft);
              color: var(--text);
            }

            .focus-banner {
              position: absolute;
              top: 1rem; right: 1rem;
              background: var(--bg-card);
              border: 1px solid var(--accent);
              padding: .5rem .75rem;
              border-radius: 4px;
              font-size: .8rem;
              display: none;
              align-items: center;
              gap: .5rem;
              box-shadow: 0 1px 2px rgba(0,0,0,.05);
            }
            .focus-banner.active { display: flex; }
            .focus-banner button {
              border: none;
              background: transparent;
              cursor: pointer;
              color: var(--text-muted);
              font-size: 1rem;
              line-height: 1;
              padding: 0 .25rem;
            }
            .focus-banner button:hover { color: var(--text); }

            /* Node styles */
            .node circle {
              stroke: white;
              stroke-width: 1.5;
              cursor: pointer;
              transition: stroke-width .15s;
            }
            .node:hover circle { stroke: var(--text); stroke-width: 2; }
            .node.selected circle { stroke: var(--accent); stroke-width: 3; }
            .node.dimmed { opacity: .12; }

            .node text {
              font-size: 10px;
              fill: var(--text);
              pointer-events: none;
              text-anchor: middle;
              opacity: 0;
              transition: opacity .15s;
              paint-order: stroke;
              stroke: var(--bg);
              stroke-width: 3px;
              stroke-linejoin: round;
            }
            .node:hover text,
            .node.selected text,
            .node.focus-member text { opacity: 1; }
            .node.dimmed text { opacity: 0; }
            /* When zoomed in past threshold, show all labels */
            svg.labels-visible .node text { opacity: 1; }
            svg.labels-visible .node.dimmed text { opacity: 0; }

            line.link {
              stroke: #cbd5e1;
              stroke-width: 1;
              stroke-opacity: .6;
            }
            line.link.highlighted {
              stroke: var(--accent);
              stroke-width: 2;
              stroke-opacity: 1;
            }
            line.link.dimmed { stroke-opacity: .08; }

            /* ------------------------------------------------------------------ */
            /* Details panel                                                       */
            /* ------------------------------------------------------------------ */
            aside.details {
              background: var(--bg-card);
              border-left: 1px solid var(--border);
              padding: 1.25rem;
              overflow-y: auto;
            }
            aside.details .empty {
              color: var(--text-muted);
              font-size: .85rem;
              text-align: center;
              margin-top: 4rem;
            }
            aside.details h2 {
              margin: 0 0 .25rem;
              font-size: 1rem;
              font-family: var(--mono);
              word-break: break-all;
            }
            aside.details .badge {
              display: inline-block;
              padding: .1rem .5rem;
              border-radius: 3px;
              font-size: .65rem;
              font-family: var(--mono);
              text-transform: uppercase;
              letter-spacing: .03em;
              font-weight: 600;
              color: white;
              margin-bottom: 1rem;
            }
            aside.details .detail-row {
              display: flex;
              justify-content: space-between;
              padding: .4rem 0;
              border-bottom: 1px solid var(--border);
              font-size: .85rem;
            }
            aside.details .detail-row .label {
              color: var(--text-muted);
            }
            aside.details .detail-row .value {
              font-family: var(--mono);
              font-weight: 500;
            }
            aside.details .deps-list {
              margin-top: 1rem;
            }
            aside.details .deps-list h3 {
              font-size: .7rem;
              text-transform: uppercase;
              letter-spacing: .05em;
              color: var(--text-muted);
              margin: 1rem 0 .5rem;
              font-weight: 600;
            }
            aside.details .deps-list .dep {
              display: block;
              padding: .25rem .5rem;
              border-radius: 3px;
              font-family: var(--mono);
              font-size: .75rem;
              margin: .15rem 0;
              cursor: pointer;
              color: var(--text);
              background: var(--bg-soft);
              transition: background .15s;
            }
            aside.details .deps-list .dep:hover {
              background: var(--bg);
              outline: 1px solid var(--border);
            }
            aside.details .deps-list .dep.missing {
              color: var(--warning);
              background: var(--warning-bg);
            }

            .legend {
              display: flex;
              flex-direction: column;
              gap: .35rem;
            }
            .legend-item {
              display: flex;
              align-items: center;
              gap: .5rem;
              font-size: .8rem;
            }
            .legend-swatch {
              width: 14px; height: 14px;
              border-radius: 50%;
              border: 1.5px solid white;
              box-shadow: 0 0 0 1px var(--border);
            }
        </style>
    </head>
    <body>
        <div class="layout">
            <!-- ============================================================= -->
            <!-- LEFT SIDEBAR : filters / stats                                  -->
            <!-- ============================================================= -->
            <aside class="controls">
                <h1>Dependencies</h1>
                <div class="subtitle" id="meta-subtitle"></div>

                <div id="warnings-container"></div>

                <div class="section">
                    <div class="section-title">Search</div>
                    <input type="search" id="search" placeholder="Filter by module name…" />
                </div>

                <div class="section">
                    <div class="section-title">Depth from your modules</div>
                    <div class="slider-wrap">
                        <input type="range" id="depth-slider" min="0" max="1" value="1" step="1" />
                        <span class="slider-value" id="depth-value">—</span>
                    </div>
                    <div class="slider-hint" id="depth-hint">Your modules + N levels of deps</div>
                </div>

                <div class="section">
                    <div class="section-title">By origin</div>
                    <div class="checkbox-list" id="origin-filters"></div>
                </div>

                <div class="section">
                    <div class="section-title">Layout</div>
                    <button class="btn btn-primary" id="layout-hierarchical">Hierarchical</button>
                    <button class="btn" id="layout-force">Force-directed</button>
                </div>

                <div class="section">
                    <div class="section-title">Quick toggles</div>
                    <button class="btn" id="toggle-odoo-ent">Hide Odoo + Enterprise</button>
                    <button class="btn" id="show-all">Show all</button>
                </div>

                <div class="section">
                    <div class="section-title">Stats</div>
                    <div class="stats-grid" id="stats-grid"></div>
                </div>

                <div class="section">
                    <div class="section-title">Legend</div>
                    <div class="legend" id="legend"></div>
                </div>
            </aside>

            <!-- ============================================================= -->
            <!-- CENTER : the graph                                              -->
            <!-- ============================================================= -->
            <main class="graph">
                <div class="floating-controls">
                    <button id="zoom-in" title="Zoom in">+</button>
                    <button id="zoom-out" title="Zoom out">−</button>
                    <button id="zoom-fit" title="Fit to screen">⊡</button>
                    <button id="reset-sim" title="Restart layout">↻</button>
                </div>

                <div class="focus-banner" id="focus-banner">
                    <span>Focus: <strong id="focus-name"></strong></span>
                    <button id="focus-clear" title="Clear focus">×</button>
                </div>

                <svg id="graph-svg"></svg>
            </main>

            <!-- ============================================================= -->
            <!-- RIGHT SIDEBAR : node details                                    -->
            <!-- ============================================================= -->
            <aside class="details" id="details-panel">
                <div class="empty">Click a node to see details</div>
            </aside>
        </div>

        <script id="report-data" type="application/json">
            __REPORT_DATA__
        </script>

        <script>
            // =================================================================
            // Data + state
            // =================================================================
            const DATA = JSON.parse(document.getElementById("report-data").textContent);
            const ADDONS = DATA.addons || [];
            const STATS = DATA.stats || {};
            const BY_NAME = Object.fromEntries(ADDONS.map((a) => [a.name, a]));

            const ORIGIN_COLORS = {};
            ["custom", "oca", "third-party", "odoo", "enterprise", "unknown"].forEach((o) => {
                const css = `--origin-${o}`;
                ORIGIN_COLORS[o] = getComputedStyle(document.documentElement).getPropertyValue(css).trim();
            });

            const ALL_ORIGINS = Array.from(new Set(ADDONS.map((a) => a.origin || "unknown"))).sort();

            const HIDDEN_BY_DEFAULT = new Set([]);
            const MAX_RDEPTH = d3.max(ADDONS, (a) => a.reverse_depth || 0) || 0;
            // Default: show our modules + a few layers of deps.
            const DEFAULT_RDEPTH = Math.min(MAX_RDEPTH, 3);

            const state = {
                enabledOrigins: new Set(ALL_ORIGINS.filter((o) => !HIDDEN_BY_DEFAULT.has(o))),
                search: "",
                focus: null,
                focusSet: null,
                layout: "hierarchical",
                maxReverseDepth: DEFAULT_RDEPTH,
            };

            // =================================================================
            // Graph adjacency (forward = depends, reverse = depended-on-by)
            // =================================================================
            const forward = {};
            const reverse = {};
            ADDONS.forEach((a) => {
                forward[a.name] = new Set(a.depends.filter((d) => d in BY_NAME));
                a.depends.forEach((d) => {
                    if (!(d in BY_NAME)) return;
                    if (!reverse[d]) reverse[d] = new Set();
                    reverse[d].add(a.name);
                });
            });

            function transitiveSet(start, graph) {
                const seen = new Set([start]);
                const stack = [start];
                while (stack.length) {
                    const n = stack.pop();
                    for (const nxt of graph[n] || []) {
                        if (!seen.has(nxt)) {
                            seen.add(nxt);
                            stack.push(nxt);
                        }
                    }
                }
                return seen;
            }

            // =================================================================
            // Build graph data for D3
            // =================================================================
            const nodes = ADDONS.map((a) => ({
                id: a.name,
                origin: a.origin || "unknown",
                data: a,
            }));

            const links = [];
            ADDONS.forEach((a) => {
                a.depends.forEach((dep) => {
                    if (dep in BY_NAME) {
                        links.push({ source: a.name, target: dep });
                    }
                });
            });

            // =================================================================
            // SVG setup + zoom
            // =================================================================
            const svgEl = document.getElementById("graph-svg");
            const svg = d3.select(svgEl);
            const width = () => svgEl.clientWidth;
            const height = () => svgEl.clientHeight;

            const g = svg.append("g");

            const zoom = d3
                .zoom()
                .scaleExtent([0.1, 5])
                .on("zoom", (e) => g.attr("transform", e.transform));

            svg.call(zoom);

            // =================================================================
            // Layout: hierarchical (default) or force-directed
            // =================================================================
            const NODE_RADIUS_BASE = 4;
            const LAYER_HEIGHT = 80;
            const NODE_HSPACING = 110;

            function nodeRadius(addon) {
                return NODE_RADIUS_BASE + Math.sqrt(addon.descendants_count || 0) * 2;
            }

            function visibleNodes() {
                const query = state.search.toLowerCase();
                return nodes.filter((n) => {
                    if (!state.enabledOrigins.has(n.origin)) return false;
                    if ((n.data.reverse_depth || 0) > state.maxReverseDepth) return false;
                    if (query && !n.id.toLowerCase().includes(query)) return false;
                    if (state.focusSet && !state.focusSet.has(n.id)) return false;
                    return true;
                });
            }

            function visibleLinks(visibleIds) {
                return links.filter((l) => {
                    const sId = typeof l.source === "object" ? l.source.id : l.source;
                    const tId = typeof l.target === "object" ? l.target.id : l.target;
                    return visibleIds.has(sId) && visibleIds.has(tId);
                });
            }

            function applyHierarchicalLayout() {
                // Group nodes by reverse_depth so user modules (rd=0) are at the top
                // and deep dependencies (base, ...) are at the bottom.
                const vis = visibleNodes();
                const visIds = new Set(vis.map((n) => n.id));
                const byLayer = d3.group(vis, (n) => n.data.reverse_depth || 0);

                // Sort layers: reverse_depth 0 (your modules) on top, higher below.
                Array.from(byLayer.entries())
                    .sort((a, b) => a[0] - b[0])
                    .forEach(([rdepth, layer]) => {
                        layer.sort(
                            (a, b) =>
                                (b.data.descendants_count || 0) - (a.data.descendants_count || 0) ||
                                a.id.localeCompare(b.id),
                        );
                        const layerWidth = (layer.length - 1) * NODE_HSPACING;
                        layer.forEach((n, i) => {
                            n.x = i * NODE_HSPACING - layerWidth / 2;
                            n.y = rdepth * LAYER_HEIGHT;
                            n.fx = n.x;
                            n.fy = n.y;
                        });
                    });

                // Hide invisibles
                nodeSel.style("display", (d) => (visIds.has(d.id) ? null : "none"));
                linkSel.style("display", (l) => {
                    const sId = typeof l.source === "object" ? l.source.id : l.source;
                    const tId = typeof l.target === "object" ? l.target.id : l.target;
                    return visIds.has(sId) && visIds.has(tId) ? null : "none";
                });

                simulation.alpha(0.3).restart();
            }

            function applyForceLayout() {
                // Release pinned positions
                nodes.forEach((n) => {
                    n.fx = null;
                    n.fy = null;
                });
                applyVisibility();
                simulation.alpha(1).restart();
            }

            function rebuildLayout() {
                if (state.layout === "hierarchical") applyHierarchicalLayout();
                else applyForceLayout();
            }

            // =================================================================
            // Force simulation (used in both modes; pinned in hierarchical)
            // =================================================================
            const linkSel = g
                .append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(links)
                .join("line")
                .attr("class", "link");

            const nodeSel = g
                .append("g")
                .attr("class", "nodes")
                .selectAll("g.node")
                .data(nodes)
                .join("g")
                .attr("class", "node")
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended))
                .on("click", (event, d) => {
                    event.stopPropagation();
                    selectNode(d.id);
                });

            nodeSel
                .append("circle")
                .attr("r", (d) => nodeRadius(d.data))
                .attr("fill", (d) => ORIGIN_COLORS[d.origin] || ORIGIN_COLORS.unknown);

            nodeSel
                .append("text")
                .attr("dy", (d) => nodeRadius(d.data) + 11)
                .text((d) => d.id);

            svg.on("click", () => {
                // Click on empty canvas -> clear focus / selection
                clearFocus();
                renderDetails(null);
                d3.selectAll(".node").classed("selected", false);
            });

            const simulation = d3
                .forceSimulation(nodes)
                .force(
                    "link",
                    d3
                        .forceLink(links)
                        .id((d) => d.id)
                        .distance(60)
                        .strength(0.3),
                )
                .force("charge", d3.forceManyBody().strength(-220))
                .force("center", d3.forceCenter(0, 0))
                .force(
                    "collide",
                    d3.forceCollide().radius((d) => nodeRadius(d.data) + 6),
                )
                .on("tick", ticked);

            function ticked() {
                linkSel
                    .attr("x1", (d) => d.source.x)
                    .attr("y1", (d) => d.source.y)
                    .attr("x2", (d) => d.target.x)
                    .attr("y2", (d) => d.target.y);
                nodeSel.attr("transform", (d) => `translate(${d.x},${d.y})`);
            }

            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }

            // Initial fit will be triggered by rebuildLayout after first paint.
            function fitToContent() {
                const vis = visibleNodes();
                if (!vis.length) return;
                const xs = vis.map((n) => n.x),
                    ys = vis.map((n) => n.y);
                const minX = Math.min(...xs),
                    maxX = Math.max(...xs);
                const minY = Math.min(...ys),
                    maxY = Math.max(...ys);
                const w = maxX - minX + 100;
                const h = maxY - minY + 100;
                const scale = Math.min(width() / w, height() / h, 1);
                const tx = width() / 2 - (scale * (minX + maxX)) / 2;
                const ty = height() / 2 - (scale * (minY + maxY)) / 2;
                svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
            }

            // =================================================================
            // Filtering + focus
            // =================================================================
            function applyVisibility() {
                if (state.layout === "hierarchical") {
                    applyHierarchicalLayout();
                    return;
                }

                // Force layout: just toggle display
                const query = state.search.toLowerCase();
                const enabled = state.enabledOrigins;
                const maxRD = state.maxReverseDepth;

                function passes(n) {
                    if (!enabled.has(n.origin)) return false;
                    if ((n.data.reverse_depth || 0) > maxRD) return false;
                    if (query && !n.id.toLowerCase().includes(query)) return false;
                    if (state.focusSet && !state.focusSet.has(n.id)) return false;
                    return true;
                }

                nodeSel.each(function (d) {
                    d3.select(this).style("display", passes(d) ? null : "none");
                });

                linkSel.each(function (l) {
                    const sId = typeof l.source === "object" ? l.source.id : l.source;
                    const tId = typeof l.target === "object" ? l.target.id : l.target;
                    const sNode = nodes.find((n) => n.id === sId);
                    const tNode = nodes.find((n) => n.id === tId);
                    d3.select(this).style("display", passes(sNode) && passes(tNode) ? null : "none");
                });
            }

            function selectNode(name) {
                // Highlight + focus the node and its connected subgraph.
                const ancestors = transitiveSet(name, forward);
                const descendants = transitiveSet(name, reverse);
                const subgraph = new Set([...ancestors, ...descendants]);

                state.focus = name;
                state.focusSet = subgraph;

                // Visual focus mode: dim everything outside, highlight links inside
                nodeSel.classed("dimmed", (d) => !subgraph.has(d.id));
                nodeSel.classed("focus-member", (d) => subgraph.has(d.id));
                nodeSel.classed("selected", (d) => d.id === name);

                linkSel
                    .classed("highlighted", (l) => {
                        const sId = typeof l.source === "object" ? l.source.id : l.source;
                        const tId = typeof l.target === "object" ? l.target.id : l.target;
                        return subgraph.has(sId) && subgraph.has(tId);
                    })
                    .classed("dimmed", (l) => {
                        const sId = typeof l.source === "object" ? l.source.id : l.source;
                        const tId = typeof l.target === "object" ? l.target.id : l.target;
                        return !subgraph.has(sId) || !subgraph.has(tId);
                    });

                // Show focus banner
                document.getElementById("focus-banner").classList.add("active");
                document.getElementById("focus-name").textContent = `${name} (${subgraph.size} related)`;

                renderDetails(name);
            }

            function clearFocus() {
                state.focus = null;
                state.focusSet = null;
                nodeSel.classed("dimmed", false).classed("selected", false).classed("focus-member", false);
                linkSel.classed("highlighted", false).classed("dimmed", false);
                document.getElementById("focus-banner").classList.remove("active");
                applyVisibility();
            }

            // =================================================================
            // Details panel
            // =================================================================
            const detailsPanel = document.getElementById("details-panel");

            function renderDetails(name) {
                if (!name) {
                    detailsPanel.innerHTML = '<div class="empty">Click a node to see details</div>';
                    return;
                }
                const a = BY_NAME[name];
                const color = ORIGIN_COLORS[a.origin] || ORIGIN_COLORS.unknown;

                detailsPanel.innerHTML = "";

                const h = document.createElement("h2");
                h.textContent = a.name;
                detailsPanel.append(h);

                const badge = document.createElement("span");
                badge.className = "badge";
                badge.style.background = color;
                badge.textContent = a.origin;
                detailsPanel.append(badge);

                const rows = [
                    ["Location", a.location || "—"],
                    ["Depth (from base)", a.depth],
                    ["Depth (from leaves)", a.reverse_depth],
                    ["Ancestors", a.ancestors_count],
                    ["Descendants", a.descendants_count],
                    ["Direct deps", a.depends.length],
                    ["Missing deps", a.missing_deps.length],
                ];
                rows.forEach(([label, value]) => {
                    const row = document.createElement("div");
                    row.className = "detail-row";
                    row.innerHTML = `<span class="label">${label}</span><span class="value">${value}</span>`;
                    detailsPanel.append(row);
                });

                // Depends
                if (a.depends.length) {
                    const wrap = document.createElement("div");
                    wrap.className = "deps-list";
                    wrap.innerHTML = "<h3>Depends on</h3>";
                    a.depends.forEach((d) => {
                        const el = document.createElement("a");
                        el.className = "dep" + (a.missing_deps.includes(d) ? " missing" : "");
                        el.textContent = d + (a.missing_deps.includes(d) ? " (missing)" : "");
                        if (!a.missing_deps.includes(d)) {
                            el.onclick = (e) => {
                                e.preventDefault();
                                selectNode(d);
                            };
                        }
                        wrap.append(el);
                    });
                    detailsPanel.append(wrap);
                }

                // Reverse deps
                const reverseDeps = Array.from(reverse[a.name] || []).sort();
                if (reverseDeps.length) {
                    const wrap = document.createElement("div");
                    wrap.className = "deps-list";
                    wrap.innerHTML = "<h3>Required by</h3>";
                    reverseDeps.forEach((d) => {
                        const el = document.createElement("a");
                        el.className = "dep";
                        el.textContent = d;
                        el.onclick = (e) => {
                            e.preventDefault();
                            selectNode(d);
                        };
                        wrap.append(el);
                    });
                    detailsPanel.append(wrap);
                }
            }

            // =================================================================
            // Sidebar: origin filters
            // =================================================================
            const originContainer = document.getElementById("origin-filters");
            ALL_ORIGINS.forEach((origin) => {
                const count = ADDONS.filter((a) => (a.origin || "unknown") === origin).length;
                const checked = state.enabledOrigins.has(origin);
                const label = document.createElement("label");
                label.innerHTML = `
        <input type="checkbox" ${checked ? "checked" : ""} data-origin="${origin}">
        <span class="swatch" style="background:${ORIGIN_COLORS[origin]}"></span>
        <span>${origin}</span>
        <span class="count">${count}</span>
      `;
                label.querySelector("input").addEventListener("change", (e) => {
                    if (e.target.checked) state.enabledOrigins.add(origin);
                    else state.enabledOrigins.delete(origin);
                    if (state.layout === "hierarchical") rebuildLayout();
                    else applyVisibility();
                });
                originContainer.append(label);
            });

            // =================================================================
            // Sidebar: stats
            // =================================================================
            const statsGrid = document.getElementById("stats-grid");
            const statCards = [
                ["Modules", STATS.total || ADDONS.length],
                ["Roots", (STATS.roots || []).length],
                ["Leaves", STATS.leaves_count || 0],
                ["Unresolved", (STATS.unresolved || []).length],
            ];
            statCards.forEach(([label, value]) => {
                const card = document.createElement("div");
                card.className = "stat";
                card.innerHTML = `<div class="value">${value}</div><div class="label">${label}</div>`;
                statsGrid.append(card);
            });

            // =================================================================
            // Sidebar: legend
            // =================================================================
            const legend = document.getElementById("legend");
            ALL_ORIGINS.forEach((origin) => {
                const item = document.createElement("div");
                item.className = "legend-item";
                item.innerHTML = `
        <span class="legend-swatch" style="background:${ORIGIN_COLORS[origin]}"></span>
        <span>${origin}</span>
      `;
                legend.append(item);
            });

            // =================================================================
            // Search
            // =================================================================
            document.getElementById("search").addEventListener("input", (e) => {
                state.search = e.target.value;
                rebuildLayout();
            });

            // =================================================================
            // Quick toggles
            // =================================================================
            document.getElementById("toggle-odoo-ent").addEventListener("click", () => {
                state.enabledOrigins.delete("odoo");
                state.enabledOrigins.delete("enterprise");
                document
                    .querySelectorAll('input[data-origin="odoo"], input[data-origin="enterprise"]')
                    .forEach((cb) => (cb.checked = false));
                rebuildLayout();
            });
            document.getElementById("show-all").addEventListener("click", () => {
                ALL_ORIGINS.forEach((o) => state.enabledOrigins.add(o));
                document.querySelectorAll("input[data-origin]").forEach((cb) => (cb.checked = true));
                rebuildLayout();
            });

            // =================================================================
            // Focus controls
            // =================================================================
            document.getElementById("focus-clear").addEventListener("click", (e) => {
                e.stopPropagation();
                clearFocus();
                renderDetails(null);
            });

            // Depth slider — counts from leaves (your modules) upward
            const depthSlider = document.getElementById("depth-slider");
            const depthValue = document.getElementById("depth-value");
            const depthHint = document.getElementById("depth-hint");
            depthSlider.max = MAX_RDEPTH;
            depthSlider.value = state.maxReverseDepth;

            function updateDepthHint() {
                const visible = ADDONS.filter((a) => (a.reverse_depth || 0) <= state.maxReverseDepth).length;
                depthValue.textContent = state.maxReverseDepth;
                depthHint.textContent = `${visible} of ${ADDONS.length} modules (${state.maxReverseDepth} / ${MAX_RDEPTH} levels of deps)`;
            }
            updateDepthHint();

            depthSlider.addEventListener("input", (e) => {
                state.maxReverseDepth = +e.target.value;
                updateDepthHint();
                rebuildLayout();
            });

            // Layout switch
            document.getElementById("layout-hierarchical").addEventListener("click", (e) => {
                state.layout = "hierarchical";
                document.getElementById("layout-hierarchical").classList.add("btn-primary");
                document.getElementById("layout-force").classList.remove("btn-primary");
                rebuildLayout();
            });
            document.getElementById("layout-force").addEventListener("click", (e) => {
                state.layout = "force";
                document.getElementById("layout-force").classList.add("btn-primary");
                document.getElementById("layout-hierarchical").classList.remove("btn-primary");
                rebuildLayout();
            });

            // Show all labels when zoomed in past threshold
            const LABELS_VISIBLE_AT = 1.2;
            zoom.on("zoom.labels", (e) => {
                svgEl.classList.toggle("labels-visible", e.transform.k >= LABELS_VISIBLE_AT);
            });

            // Apply hierarchical layout on first paint
            requestAnimationFrame(() => {
                rebuildLayout();
                setTimeout(fitToContent, 100);
            });

            // =================================================================
            // Floating zoom controls
            // =================================================================
            document.getElementById("zoom-in").onclick = () => svg.transition().call(zoom.scaleBy, 1.4);
            document.getElementById("zoom-out").onclick = () => svg.transition().call(zoom.scaleBy, 1 / 1.4);
            document.getElementById("zoom-fit").onclick = fitToContent;
            document.getElementById("reset-sim").onclick = () => {
                simulation.alpha(1).restart();
            };

            // =================================================================
            // Warnings + meta
            // =================================================================
            if (DATA.warnings && DATA.warnings.length) {
                const wc = document.getElementById("warnings-container");
                DATA.warnings.forEach((w) => {
                    const div = document.createElement("div");
                    div.className = "warning-banner";
                    div.textContent = w;
                    wc.append(div);
                });
            }
            document.getElementById("meta-subtitle").textContent = `${ADDONS.length} modules · ${links.length} edges`;
        </script>
    </body>
</html>
