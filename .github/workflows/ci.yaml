name: CI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-caching: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install
        run: make install

      - name: Lint (ruff)
        run: make lint

      - name: Type-check (pyright)
        run: make typecheck

      - name: Run tests
        run: make test
  update-dotfiles:
    needs: [test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: apikcloud/dotfiles
          token: ${{ secrets.BOT_TOKEN }}

      - name: Update oops version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          sed -i "s|git+https://github.com/apikcloud/oops.git@.*|git+https://github.com/apikcloud/oops.git@${VERSION}|" .chezmoidata/packages.yaml

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .chezmoidata/packages.yaml
          git commit -m "chore: bump oops to ${{ github.event.release.tag_name }}"
          git push
